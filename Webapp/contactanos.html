<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CONTACTANOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/contactanos.css">
    <link rel="stylesheet" href="../Styles/header.css">
    <link rel="stylesheet" href="../Styles/footer.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
</head>
<body>
<div id="header" class="sticky-top"></div>
    <form>
        <div class="container">
            <div class="row">
                <div class="col-12 col-md-6 mb-3">
                    <input id="nameBox" name="nameBox" class="form-control" placeholder="NOMBRE" required>
                </div>
                <div class="col-12 col-md-6 mb-3">
                    <input id="phoneBox" name="phone" class="form-control" placeholder="TELEFONO" required>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 text-center">
                    <label id="messageBoxLabel" for="messageBox" class="form-label">Mensaje:</label>
                    <textarea id="messageBox" name="message" class="form-control" required></textarea>
                </div>
            </div>
            <div class="row justify-content-center mt-3">
                <div class="col-12 col-md-6 text-center">
                    <input id="submitButton" type="submit" value="Enviar" class="btn btn-primary">
                </div>
            </div>
        </div>
    </form>
<div id="footer"></div>
<script> fetch('header.html')
    .then(response => response.text()
        .then(data=>{ document.getElementById('header').innerHTML = data}))</script>
<script> fetch('footer.html')
    .then(response => response.text()
        .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
</body>
</html>
