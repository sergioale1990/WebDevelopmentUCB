<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="../Styles/login.css">
    <link rel="stylesheet" href="../Styles/header.css">
    <link rel="stylesheet" href="../Styles/footer.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
</head>

<body>
    <h1>LUZAM WEB APPLICATION</h1>
    <div id="header" class="sticky-top"></div>
    <div class="Login">
        <form id="loginForm">
            <label id="usernameLabel" for="username">Usuario:</label>
            <input id="usernameBox" type="text" id="username" name="username" required>
            <label id="passwordLabel" for="password">Contraseña:</label>
            <input id="passwordBox" type="password" id="password" name="password" required>
            <input id="submitButton" type="submit" value="Ingresar" href="WebApp/home.html">
        </form>
    </div>
    <div id="footer"></div>
    <script> fetch('header.html')
        .then(response => response.text()
            .then(data=>{ document.getElementById('header').innerHTML = data}))</script>
    <script> fetch('footer.html')
        .then(response => response.text()
            .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
</body>

</html>
