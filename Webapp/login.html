<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="../Styles/login.css">
    <link rel="stylesheet" href="../Styles/header.css">
    <link rel="stylesheet" href="../Styles/footer.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
</head>

<body>
    <h1>LUZAM WEB APPLICATION</h1>
    <div id="header" class="sticky-top"></div>
    <div class="container">
        <form id="loginForm" class="mb-3">
            <input class="form-control" type="text" id="username" placeholder="Usuario" required>
            <input class="form-control" type="password" id="password" placeholder="Contraseña" required>
            <div class="row justify-content-center mt-3">
                <div class="col-12 col-md-6 text-center">
                    <button id="submitButton" type="submit" value="Ingresar" href="WebApp/home.html">Ingresar</button>
                </div>
            </div>
        </form>
    </div>
    <div id="footer"></div>
    <script> fetch('header.html')
        .then(response => response.text()
            .then(data=>{ document.getElementById('header').innerHTML = data}))</script>
    <script> fetch('footer.html')
        .then(response => response.text()
            .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>

</html>
