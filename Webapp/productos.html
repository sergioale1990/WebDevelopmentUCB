<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>PRODUCTOS</title>
        <link rel="stylesheet" href="../Styles/productos.css">
        <link rel="stylesheet" href="../Styles/header.css">
        <link rel="stylesheet" href="../Styles/footer.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
    </head>
    <body>
    <div id="header" class="sticky-top"></div>
        <h1> <b>PRODUCTOS</b></h1>
        <div class="Content">
            <img src="../Resources/Centrifugas.png" title="Bombas Centrifugas" alt="Centrifugas" width="400" height="150">
            <img src = "../Resources/Perifericas.png" title = "Bombas Perifericas" alt="Perifericas" width="400" height="150">
            <img src = "../Resources/Jet.png" alt="Jet" title = "Bombas Jet" width="400" height="150">
        </div>
        <div id="footer"></div>
        <script> fetch('header.html')
            .then(response => response.text()
                .then(data=>{ document.getElementById('header').innerHTML = data}))</script>
        <script> fetch('footer.html')
            .then(response => response.text()
                .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
    </body>
</html>
