<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>PRODUCTOS</title>
        <link rel="stylesheet" href="../static/css/categorias.css">
        <link rel="stylesheet" href="../static/css/header.css">
        <link rel="stylesheet" href="../static/css/footer.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
    </head>
    <body>
        <div id="header" class="sticky-top"></div>
        <h1> <b>CATEGORIAS</b></h1>
        <div class="Content">
            <div>
                <div>
                    <h2>Bombas Centrifugas</h2>
                </div>
                <div>
                    <img src="../static/images/categories/Centrifugas.png" title="Bombas Centrifugas" alt="Centrifugas" >
                </div>
            </div>
            <div>
                <div>
                    <h2>Bombas Perifericas</h2>
                </div>
                <div>
                    <img src = "../static/images/categories/Perifericas.png" title = "Bombas Perifericas" alt="Perifericas">
                </div>
            </div>
            <div>
                <div>
                    <h2>Bombas Jet</h2>
                </div>
                <div>
                    <img src = "../static/images/categories/Jet.png" alt="Jet" title = "Bombas Jet">
                </div>
            </div>
        </div>
        <div id="footer"></div>
        <script> fetch('header.html')
            .then(response => response.text()
                .then(data=>{ document.getElementById('header').innerHTML = data}))</script>
        <script> fetch('footer.html')
            .then(response => response.text()
                .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    </body>
</html>
