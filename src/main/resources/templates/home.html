<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUZAM HOME PAGE</title>
    <link rel="stylesheet" href="../../../../Styles/home.css">
    <link rel="stylesheet" href="../../../../Styles/header.css">
    <link rel="stylesheet" href="../../../../Styles/footer.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" />
</head>

<body>
<div id="header" class="sticky-top"></div>
    <div id="carousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="/Resources/HomeSlider/LMM_0159.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="/Resources/HomeSlider/leo.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="/Resources/HomeSlider/weber.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
        <div id="footer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script> fetch('header.html')
.then(response => response.text()
.then(data=>{ document.getElementById('header').innerHTML = data}))</script>
<script> fetch('footer.html')
    .then(response => response.text()
        .then(data=>{ document.getElementById('footer').innerHTML = data}))</script>
</body>

</html>
